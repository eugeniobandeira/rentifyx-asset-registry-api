name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore rentifyx_asset_registry_api.slnx

      - name: Build
        run: dotnet build rentifyx_asset_registry_api.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test rentifyx_asset_registry_api.slnx --no-build --configuration Release --verbosity normal
