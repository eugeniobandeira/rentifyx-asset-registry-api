name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore RentifyxAssetRegistry.slnx

      - name: Build
        run: dotnet build RentifyxAssetRegistry.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test RentifyxAssetRegistry.slnx --no-build --configuration Release --verbosity normal

      - name: OWASP dependency-check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'RentifyxAssetRegistry'
          path: '.'
          format: 'HTML'
          out: 'reports/dependency-check'
          args: >
            --failOnCVSS 7
            --enableRetired

      - name: Upload dependency-check report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: reports/dependency-check

      - name: Build Docker image
        run: docker build -t rentifyx-asset-registry:${{ github.sha }} .

      - name: Trivy container scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: 'rentifyx-asset-registry:${{ github.sha }}'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true
